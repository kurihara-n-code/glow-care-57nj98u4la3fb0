<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex,nofollow,noarchive">
    <meta name="googlebot" content="noindex,nofollow,noarchive">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="glow by Fashionista 美容液毛穴ケアの限定LP">
    <title>glow by Fashionista | ツヤ肌と肌改善の継続グラフ</title>
    <link rel="preload" as="image" href="images/section1.png">
    <link rel="preload" as="image" href="images/reserve2.png">
    <style>
      * {
        box-sizing: border-box;
      }

      html {
        background: #fdf8f2;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: #fdf8f2;
        padding-bottom: calc(94px + env(safe-area-inset-bottom));
      }

      main {
        width: min(100%, 853px);
        margin: 0 auto;
        background: #fff;
        box-shadow: 0 0 42px rgba(123, 91, 42, 0.08);
      }

      .lp-section {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .floating-cta {
        position: fixed;
        z-index: 100;
        right: 50%;
        bottom: max(12px, env(safe-area-inset-bottom));
        display: block;
        width: min(430px, calc(82vw - 24px));
        line-height: 0;
        transform: translateX(50%);
        transition: transform 160ms ease, filter 160ms ease;
      }

      .floating-cta img {
        display: block;
        width: 100%;
        height: auto;
        filter: drop-shadow(0 10px 22px rgba(116, 56, 43, 0.3));
      }

      .floating-cta:hover,
      .floating-cta:focus-visible {
        outline: none;
        transform: translateX(50%) translateY(-2px);
        filter: brightness(1.03);
      }

      @media (max-width: 560px) {
        body {
          padding-bottom: calc(78px + env(safe-area-inset-bottom));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .floating-cta {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="glow by Fashionista 美容液毛穴ケア ランディングページ">
      <img class="lp-section" src="images/section1.png" width="853" height="1844" fetchpriority="high" alt="ツヤ肌と肌改善の継続グラフ。ノーファンデが最短で実現。">
      <img class="lp-section" src="images/section2.png" width="853" height="1844" loading="lazy" alt="ターンオーバーが乱れる原因と整うメリット。">
      <img class="lp-section" src="images/section3.png" width="853" height="1844" loading="lazy" alt="美容液を使用して毛穴洗浄をやるメリット。">
      <img class="lp-section" src="images/section4.png" width="853" height="1844" loading="lazy" alt="毛穴洗浄の効果を底上げして持続するオプションメニュー。">
      <img class="lp-section" src="images/section5.png" width="853" height="1844" loading="lazy" alt="ツヤ肌、ノーファンデ肌になれるメリット。">
    </main>

    <a
      class="floating-cta"
      href="https://kurihara-n-code.github.io/glow-dohwza7xy61ftg/#store-list"
      aria-label="店舗一覧ページへ移動して予約する"
    >
      <img src="images/reserve2.png" width="1352" height="352" alt="予約する">
    </a>
  </body>
</html>
